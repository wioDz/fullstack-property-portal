# Spring Boot application configuration for the Property Market Analysis backend.

# Application name shown in actuator and logs.
spring.application.name=property-market-analysis

# Server port. The Docker container maps host port 8080 to this port.
server.port=8080

# URL of the ML service. Override with ML_SERVICE_URL env var for local development.
ml.service.url=${ML_SERVICE_URL:http://localhost:8001}

# Path to the housing dataset CSV. Override with DATA_PATH env var for local development.
# Docker Compose mounts ./data to /app/data, so the default works inside the container.
data.csv.path=${DATA_PATH:/app/data/housing_train.csv}

# Enable Spring's cache abstraction backed by Caffeine.
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=60s

# Expose the health endpoint for Docker Compose health checks.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Disable verbose Spring banner in container logs.
spring.main.banner-mode=off
